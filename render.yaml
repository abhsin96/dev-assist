services:
  # Backend API Service
  - type: web
    name: devhub-api
    runtime: python
    region: oregon
    plan: starter # Change to 'free' for testing
    rootDir: apps/api
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run uvicorn devhub.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: devhub-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: API_JWT_SECRET
        sync: false # Set manually in dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # Set manually for security
      - key: OPENAI_API_KEY
        sync: false
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_TRACING_V2
        value: "true"
      - key: LANGCHAIN_PROJECT
        value: devhub-production
      - key: CORS_ORIGINS
        value: https://your-frontend-url.vercel.app
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  # PostgreSQL Database
  - name: devhub-db
    databaseName: devhub
    plan: starter
    region: oregon
    postgresMajorVersion: "16"

  # Redis Cache
  - name: devhub-redis
    plan: starter
    region: oregon
