name: Synthetic Health Check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # manual trigger for testing

env:
  API_BASE: https://devhub-api-staging.fly.dev
  WEB_BASE: https://devhub-staging.vercel.app

jobs:
  check:
    name: Uptime check
    runs-on: ubuntu-latest

    steps:
      - name: GET /healthz
        id: healthz
        run: |
          status=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 10 "${{ env.API_BASE }}/healthz")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          [ "$status" = "200" ] || (echo "healthz returned $status" && exit 1)

      - name: GET /readyz — all services ok
        id: readyz
        run: |
          body=$(curl -sf --max-time 10 "${{ env.API_BASE }}/readyz")
          echo "$body"
          echo "$body" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'readyz degraded: {d}'
          print('readyz: ok')
          "

      - name: GET web root — 2xx
        id: web
        run: |
          status=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 15 "${{ env.WEB_BASE }}")
          echo "status=$status" >> "$GITHUB_OUTPUT"
          [[ "$status" =~ ^2 ]] || (echo "web root returned $status" && exit 1)

      - name: Scripted run — thread round-trip
        # Mints an ephemeral test JWT (SYNTHETIC_JWT_SECRET must match API_JWT_SECRET
        # for the staging environment; stored as a repo secret).
        # Creates a thread, verifies the response shape, then deletes it.
        env:
          SYNTHETIC_API_TOKEN: ${{ secrets.SYNTHETIC_API_TOKEN }}
        run: |
          # Create thread
          response=$(curl -sf --max-time 15 \
            -X POST "${{ env.API_BASE }}/api/threads" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SYNTHETIC_API_TOKEN" \
            -d '{"title":"synthetic-check"}')
          echo "$response"
          thread_id=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Created thread: $thread_id"

          # Verify it appears in list
          list=$(curl -sf --max-time 15 \
            "${{ env.API_BASE }}/api/threads" \
            -H "Authorization: Bearer $SYNTHETIC_API_TOKEN")
          echo "$list" | python3 -c "
          import sys, json
          threads = json.load(sys.stdin)
          ids = [t['id'] for t in threads]
          assert '$thread_id' in ids, f'Thread $thread_id not found in list'
          print('Thread visible in list: ok')
          "

          # Delete thread
          curl -sf --max-time 15 \
            -X DELETE "${{ env.API_BASE }}/api/threads/$thread_id" \
            -H "Authorization: Bearer $SYNTHETIC_API_TOKEN"
          echo "Thread deleted: ok"

      # ── Page on failure ────────────────────────────────────────────────────
      - name: Open GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Synthetic check failed — ${new Date().toISOString()}`;
            const body = [
              '**Synthetic health check failed.** One or more steps did not pass:',
              '',
              `- healthz status: ${{ steps.healthz.outputs.status || 'n/a' }}`,
              `- readyz: see logs`,
              `- web status: ${{ steps.web.outputs.status || 'n/a' }}`,
              '',
              `[View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            // Re-open existing open alert issue instead of flooding with duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'synthetic-alert',
              state: 'open',
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['synthetic-alert', 'incident'],
              });
            }
